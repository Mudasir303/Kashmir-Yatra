<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Kashmir Yatra</title>
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/font-awesome.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <link rel="stylesheet" href="assets/css/admin-login.css">
</head>

<body>

    <div class="login-page-wrapper">
        <div class="login-card">
            <!-- Left Side (Image/Branding) -->
            <div class="login-card-left">
                <div class="overlay-content">
                    <img src="assets/img/logo kashmir yatra.png" alt="Kashmir Yatra" class="card-logo">
                    <h2>Kashmir Yatra</h2>
                    <p>Experience the timeless beauty of the mountains and valleys. Your portal to paradise starts here.
                    </p>
                </div>
            </div>

            <!-- Right Side (Form) -->
            <div class="login-card-right">
                <div class="form-header">
                    <h3>Admin Portal</h3>
                    <p>Secure authentication required</p>
                </div>

                <form id="loginForm">
                    <div class="input-group-custom">
                        <label for="email">Email Address</label>
                        <div class="input-field">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="admin@kashmiryatra.com" required>
                        </div>
                    </div>

                    <div class="input-group-custom">
                        <label for="password">Security Password</label>
                        <div class="input-field">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="••••••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login-card">SIGN IN TO DASHBOARD</button>
                </form>
                <div id="errorMessage" class="text-center mt-3" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/admin-login.js"></script>
</body>

</html>
